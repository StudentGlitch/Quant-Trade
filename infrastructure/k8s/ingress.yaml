apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quant-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: quant-swarm.local
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: quant-api-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stockscope-ui-service # Assuming existing frontend service
            port:
              number: 3000

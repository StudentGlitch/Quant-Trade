apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-api-deployment
  labels:
    app: quant-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quant-api
  template:
    metadata:
      labels:
        app: quant-api
    spec:
      containers:
      - name: api
        image: quant-engine:latest
        imagePullPolicy: IfNotPresent
        command: ["uv", "run", "uvicorn", "stockscope-unified.backend.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        env:
        - name: CELERY_BROKER_URL
          value: "redis://redis-service:6379/0"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis-service:6379/1"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: quant-api-service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: quant-api

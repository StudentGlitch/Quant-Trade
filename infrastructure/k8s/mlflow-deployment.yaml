apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-tracking-server
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:latest
        ports:
        - containerPort: 5000
        env:
        - name: MLFLOW_BACKEND_STORE_URI
          value: "sqlite:///mlflow/mlflow.db"
        - name: MLFLOW_ARTIFACT_ROOT
          value: "s3://quant-artifacts/mlruns/"
        - name: AWS_ACCESS_KEY_ID
          value: "swarm_admin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "swarm_secret"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://minio:9000"
        command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000"]
        volumeMounts:
        - name: mlflow-db
          mountPath: /mlflow
      volumes:
      - name: mlflow-db
        persistentVolumeClaim:
          claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
spec:
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: mlflow

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-celery-beat
  labels:
    app: quant-celery-beat
spec:
  replicas: 1 # Strictly 1 to avoid duplicate scheduling
  selector:
    matchLabels:
      app: quant-celery-beat
  template:
    metadata:
      labels:
        app: quant-celery-beat
    spec:
      containers:
      - name: beat
        image: quant-engine:latest
        imagePullPolicy: IfNotPresent
        command: ["uv", "run", "celery", "-A", "src.workers.celery_app", "beat", "--loglevel=info"]
        env:
        - name: CELERY_BROKER_URL
          value: "redis://redis-service:6379/0"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis-service:6379/1"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

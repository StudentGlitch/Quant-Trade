apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-worker-high-priority
  labels:
    app: quant-worker
    queue: high-priority
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quant-worker
      queue: high-priority
  template:
    metadata:
      labels:
        app: quant-worker
        queue: high-priority
    spec:
      containers:
      - name: worker
        image: quant-engine:latest
        imagePullPolicy: IfNotPresent
        command: ["uv", "run", "celery", "-A", "src.workers.celery_app", "worker", "-Q", "high_priority", "--loglevel=info"]
        env:
        - name: CELERY_BROKER_URL
          value: "redis://redis-service:6379/0"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis-service:6379/1"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1"
          limits:
            memory: "2Gi"
            cpu: "2"
---
apiVersion: apps/v1
kind: Deployment
